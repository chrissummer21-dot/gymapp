<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0f1a">
<title>Gym Quest · Recomposición y Postura</title>
<style>
:root{
  --bg:#0b0f1a; --bg2:#111827; --card:#161d2e; --card2:#1c2540;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.14);
  --txt:#eef2ff; --muted:#93a0bd; --muted2:#66739a;
  --violet:#8b5cf6; --indigo:#6366f1; --cyan:#22d3ee; --lime:#22c55e;
  --orange:#fb923c; --pink:#f472b6; --blue:#60a5fa; --gold:#fbbf24;
  --grad:linear-gradient(135deg,#8b5cf6 0%,#6366f1 45%,#22d3ee 100%);
  --grad-lime:linear-gradient(135deg,#22c55e 0%,#84cc16 100%);
  --grad-rest:linear-gradient(135deg,#60a5fa 0%,#818cf8 100%);
  --shadow:0 20px 50px -20px rgba(0,0,0,.7);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;
  background:radial-gradient(1200px 700px at 50% -10%,#1a2138 0%,var(--bg) 60%);
  color:var(--txt); min-height:100vh; min-height:100dvh;
  overflow-x:hidden; -webkit-font-smoothing:antialiased;
}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:200}
.app{max-width:520px;margin:0 auto;padding:22px 18px 40px;position:relative;min-height:100dvh}
button{font-family:inherit;cursor:pointer;border:none;color:inherit;background:none}
a{color:inherit}

/* ---------- top stats bar ---------- */
.topbar{display:flex;align-items:center;gap:11px;margin-bottom:22px}
.avatar{width:50px;height:50px;border-radius:15px;flex:none;position:relative;
  background:var(--grad);display:grid;place-items:center;font-size:23px;box-shadow:0 8px 24px -8px var(--indigo)}
.lvlbadge{position:absolute;bottom:-6px;right:-6px;background:var(--gold);color:#3b2a00;
  font-size:11px;font-weight:800;min-width:22px;height:22px;padding:0 5px;border-radius:11px;
  display:grid;place-items:center;border:3px solid var(--bg)}
.topmeta{flex:1;min-width:0}
.topmeta .lvl{font-size:12.5px;color:var(--muted);font-weight:600}
.xpbar{height:9px;border-radius:6px;background:var(--card2);overflow:hidden;margin-top:6px}
.xpbar>i{display:block;height:100%;background:var(--grad);width:0;border-radius:6px;
  transition:width .9s cubic-bezier(.22,1,.36,1);box-shadow:0 0 12px rgba(139,92,246,.6)}
.xptext{font-size:11px;color:var(--muted2);margin-top:4px;font-weight:600}
.streak{display:flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--line);
  padding:9px 11px;border-radius:13px;font-weight:800;font-size:14px;white-space:nowrap}
.streak.on{color:var(--orange);border-color:rgba(251,146,60,.35);box-shadow:0 0 18px -6px var(--orange)}
.hamb{width:46px;height:46px;flex:none;border-radius:13px;background:var(--card);border:1px solid var(--line);
  display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:center;transition:transform .12s}
.hamb:active{transform:scale(.9)}
.hamb i{width:18px;height:2px;background:var(--txt);border-radius:2px;display:block}

/* ---------- screens ---------- */
.screen{animation:screenIn .5s cubic-bezier(.22,1,.36,1)}
@keyframes screenIn{from{opacity:0;transform:translateY(14px) scale(.99)}to{opacity:1;transform:none}}

/* ---------- home ---------- */
.hello{font-size:14px;color:var(--muted);font-weight:600;margin:2px 0}
.headline{font-size:26px;font-weight:800;letter-spacing:-.02em;margin:0 0 20px;line-height:1.15}
.headline b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.daycard{position:relative;border-radius:26px;padding:24px 22px;overflow:hidden;
  background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line2);box-shadow:var(--shadow)}
.daycard .glow{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(420px 200px at 100% 0%,rgba(139,92,246,.25),transparent 70%)}
.daycard.rest .glow{background:radial-gradient(420px 200px at 100% 0%,rgba(96,165,250,.28),transparent 70%)}
.dcnum{font-size:13px;font-weight:800;letter-spacing:.14em;color:var(--muted);text-transform:uppercase}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:800;padding:6px 11px;border-radius:999px}
.badge.gym{background:rgba(139,92,246,.16);color:#c4b5fd;border:1px solid rgba(139,92,246,.3)}
.badge.rest{background:rgba(96,165,250,.16);color:#bfdbfe;border:1px solid rgba(96,165,250,.3)}
.dctitle{font-size:27px;font-weight:800;letter-spacing:-.02em;margin:12px 0 6px;line-height:1.1}
.dcsub{color:var(--muted);font-size:15px;line-height:1.5;margin:0}
.dcmeta{display:flex;gap:18px;margin-top:20px}
.dcmeta .m{display:flex;flex-direction:column;gap:2px}
.dcmeta .m b{font-size:22px;font-weight:800}
.dcmeta .m span{font-size:12px;color:var(--muted);font-weight:600}

.cta{width:100%;margin-top:22px;padding:19px;border-radius:18px;font-size:18px;font-weight:800;
  background:var(--grad);color:#fff;position:relative;overflow:hidden;
  box-shadow:0 14px 30px -12px var(--indigo);transition:transform .12s}
.cta.rest{background:var(--grad-rest);box-shadow:0 14px 30px -12px var(--blue)}
.cta:active{transform:scale(.97)}
.cta .sheen{position:absolute;top:0;left:-60%;width:40%;height:100%;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.35),transparent);
  transform:skewX(-20deg);animation:sheen 3.4s ease-in-out infinite}
@keyframes sheen{0%,60%{left:-60%}100%{left:130%}}
.ghostbtn{width:100%;margin-top:11px;padding:15px;border-radius:16px;font-size:15px;font-weight:700;
  background:var(--card);border:1px solid var(--line2);color:var(--muted);transition:transform .12s,color .2s}
.ghostbtn:active{transform:scale(.97)}
.ghostbtn:hover{color:var(--txt)}

.weekstrip{display:flex;gap:7px;margin-top:24px}
.wd{flex:1;height:52px;border-radius:13px;background:var(--card);border:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--muted2);transition:.3s}
.wd .dot{width:7px;height:7px;border-radius:50%;background:var(--line2)}
.wd.done{color:var(--lime);border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.08)}
.wd.done .dot{background:var(--lime);box-shadow:0 0 8px var(--lime)}
.wd.current{color:#fff;border-color:var(--violet);background:rgba(139,92,246,.14);box-shadow:0 0 16px -4px var(--violet)}
.wd.current .dot{background:var(--violet);box-shadow:0 0 8px var(--violet)}

.donetoday{margin-top:22px;text-align:center;background:rgba(34,197,94,.08);
  border:1px solid rgba(34,197,94,.28);border-radius:18px;padding:18px}
.donetoday .big{font-size:17px;font-weight:800;color:var(--lime)}
.donetoday .sm{font-size:13px;color:var(--muted);margin-top:4px}
.linkbtn{background:none;color:var(--muted);font-size:13px;font-weight:700;text-decoration:underline;
  text-underline-offset:3px;margin-top:12px}
.linkbtn:hover{color:var(--txt)}

/* ---------- workout focus ---------- */
.wtop{display:flex;align-items:center;gap:14px;margin-bottom:8px}
.iconbtn{width:44px;height:44px;flex:none;border-radius:14px;background:var(--card);border:1px solid var(--line);
  display:grid;place-items:center;font-size:20px;color:var(--muted);transition:transform .12s}
.iconbtn:active{transform:scale(.9)}
.wprog{flex:1}
.wprog .pbar{height:10px;border-radius:6px;background:var(--card2);overflow:hidden}
.wprog .pbar>i{display:block;height:100%;background:var(--grad-lime);width:0;border-radius:6px;
  transition:width .6s cubic-bezier(.22,1,.36,1);box-shadow:0 0 12px rgba(34,197,94,.5)}
.wprog .ptext{font-size:12px;color:var(--muted);font-weight:700;margin-top:6px}
.wprog .ptext b{color:var(--txt)}

.exwrap{position:relative;margin-top:14px}
.exercise{border-radius:26px;padding:24px 22px;background:linear-gradient(165deg,var(--card2),var(--card));
  border:1px solid var(--line2);box-shadow:var(--shadow);position:relative;overflow:hidden}
.exercise .eglow{position:absolute;top:-40%;right:-20%;width:70%;height:80%;pointer-events:none;
  background:radial-gradient(circle,rgba(139,92,246,.22),transparent 70%);filter:blur(6px)}
.extag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.03em;
  padding:6px 11px;border-radius:999px;text-transform:uppercase}
.extag.circuit{background:rgba(244,114,182,.14);color:#fbcfe8;border:1px solid rgba(244,114,182,.3)}
.extag.corr{background:rgba(34,211,238,.14);color:#a5f3fc;border:1px solid rgba(34,211,238,.3)}
.extag.main{background:rgba(251,146,60,.14);color:#fed7aa;border:1px solid rgba(251,146,60,.3)}
.extag.calm{background:rgba(96,165,250,.14);color:#bfdbfe;border:1px solid rgba(96,165,250,.3)}
.exname{font-size:27px;font-weight:800;letter-spacing:-.02em;line-height:1.12;margin:14px 0 0}

/* circuit strip */
.circuit{margin-top:16px}
.circuit-h{font-size:12px;font-weight:800;letter-spacing:.03em;color:#fbcfe8;margin-bottom:9px}
.csegs{display:flex;gap:6px}
.cseg{flex:1;height:9px;border-radius:6px;background:var(--card2);border:1px solid var(--line2);overflow:hidden;position:relative;transition:.3s}
.cseg>i{display:block;height:100%;background:var(--grad-lime);width:0;transition:width .5s cubic-bezier(.22,1,.36,1)}
.cseg.cdone{border-color:transparent}
.cseg.ccur{border-color:var(--pink);box-shadow:0 0 12px -2px var(--pink)}
.cseg.ccur>i{background:linear-gradient(135deg,#f472b6,#8b5cf6)}
.nexthint{text-align:center;font-size:13px;color:var(--muted2);margin-top:14px;font-weight:600}
.nexthint b{color:var(--cyan)}

/* weight box */
.weightbox{margin-top:12px;background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:18px;padding:14px 18px}
.weightbox .wl{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.wrow{display:flex;gap:10px;margin-top:10px;align-items:center}
.wrow input{flex:1;min-width:0;background:var(--card2);border:1px solid var(--line2);border-radius:13px;color:var(--txt);
  font:inherit;font-size:22px;font-weight:800;padding:11px 14px;text-align:center;outline:none;
  -moz-appearance:textfield;appearance:textfield}
.wrow input::-webkit-outer-spin-button,.wrow input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.wrow input:focus{border-color:var(--violet);box-shadow:0 0 14px -4px var(--violet)}
.unitbtn{flex:none;width:62px;padding:13px 0;border-radius:13px;font-size:15px;font-weight:800;
  background:rgba(139,92,246,.16);border:1px solid rgba(139,92,246,.35);color:#c4b5fd;transition:transform .12s}
.unitbtn:active{transform:scale(.92)}
.whint{font-size:12px;color:var(--muted2);margin-top:9px;font-weight:600}
.whint b{color:var(--cyan)}
.txtin{width:100%;background:var(--card2);border:1px solid var(--line2);border-radius:12px;color:var(--txt);
  font:inherit;font-size:13px;padding:11px 12px;margin-top:8px;outline:none}
.txtin:focus{border-color:var(--violet)}

/* set indicator */
.setbox{margin-top:16px;background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:18px;padding:16px 18px}
.setlabel{display:flex;align-items:baseline;justify-content:space-between}
.setlabel .sl{font-size:12px;font-weight:800;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
.setlabel .sn b{font-size:32px;font-weight:800;background:var(--grad-lime);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.setlabel .sn span{font-size:16px;color:var(--muted);font-weight:700}
.pips{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.pip{flex:1;min-width:26px;height:12px;border-radius:7px;background:var(--card2);border:1px solid var(--line2);transition:.35s}
.pip.filled{background:var(--grad-lime);border-color:transparent;box-shadow:0 0 12px rgba(34,197,94,.5)}
.pip.current{background:rgba(139,92,246,.25);border-color:var(--violet);box-shadow:0 0 14px -2px var(--violet);
  animation:pipPulse 1.4s ease-in-out infinite}
@keyframes pipPulse{0%,100%{opacity:1}50%{opacity:.55}}
.reptarget{margin-top:14px;font-size:15px;color:var(--muted)}
.reptarget b{color:var(--txt);font-weight:800}

.exmus{display:flex;flex-wrap:wrap;gap:7px;margin-top:16px}
.chip{font-size:12px;font-weight:600;color:var(--muted);background:var(--card);border:1px solid var(--line);padding:6px 10px;border-radius:9px}
.accord{margin-top:16px;border-top:1px solid var(--line);padding-top:4px}
.acc{border-bottom:1px solid var(--line)}
.acc>button{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 2px;font-size:15px;font-weight:700;color:var(--txt)}
.acc>button .ic{color:var(--muted);transition:transform .3s;font-size:13px}
.acc.open>button .ic{transform:rotate(90deg);color:var(--violet)}
.acc .body{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.22,1,.36,1),opacity .3s;opacity:0}
.acc.open .body{max-height:360px;opacity:1}
.acc .body p{margin:0 0 14px;color:var(--muted);font-size:14.5px;line-height:1.6}
.videobtn{display:inline-flex;align-items:center;gap:9px;color:#fca5a5;font-weight:700;font-size:14px;
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);padding:11px 15px;border-radius:13px;
  text-decoration:none;margin-bottom:16px;transition:transform .12s}
.videobtn:active{transform:scale(.96)}
.exactions{display:flex;gap:11px;margin-top:20px}
.done{flex:1;padding:19px;border-radius:18px;font-size:17px;font-weight:800;color:#052e12;
  background:var(--grad-lime);box-shadow:0 14px 30px -12px var(--lime);
  display:flex;align-items:center;justify-content:center;gap:9px;transition:transform .12s}
.done:active{transform:scale(.96)}
.skip{flex:none;padding:19px 18px;border-radius:18px;font-size:14px;font-weight:700;
  background:var(--card);border:1px solid var(--line2);color:var(--muted);transition:transform .12s}
.skip:active{transform:scale(.94)}
.skip:hover{color:var(--txt)}
.skipnote{text-align:center;font-size:12.5px;color:var(--muted2);margin-top:14px;font-weight:600}
.skipnote b{color:var(--orange)}
.exwrap.out-next .exercise{animation:slideOutL .32s cubic-bezier(.5,0,.75,0) forwards}
.exwrap.out-skip .exercise{animation:slideOutR .34s cubic-bezier(.5,0,.75,0) forwards}
.exwrap.in .exercise{animation:cardIn .42s cubic-bezier(.22,1,.36,1)}
.exwrap.bump .exercise{animation:bump .4s cubic-bezier(.22,1.4,.4,1)}
@keyframes slideOutL{to{opacity:0;transform:translateX(-40px) scale(.94)}}
@keyframes slideOutR{to{opacity:0;transform:translateX(60px) rotate(4deg) scale(.92)}}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
@keyframes bump{0%{transform:scale(1)}40%{transform:scale(1.02)}100%{transform:scale(1)}}

/* ---------- complete screens ---------- */
.complete{text-align:center;padding-top:14px}
.trophy{width:118px;height:118px;margin:8px auto 6px;border-radius:36px;display:grid;place-items:center;font-size:60px;
  background:var(--grad);box-shadow:0 20px 50px -14px var(--indigo);animation:pop .7s cubic-bezier(.18,1.4,.4,1) both}
.trophy.rest{background:var(--grad-rest);box-shadow:0 20px 50px -14px var(--blue)}
.trophy.week{background:linear-gradient(135deg,#fbbf24,#f97316,#ec4899);box-shadow:0 20px 50px -14px #f97316}
@keyframes pop{0%{transform:scale(0) rotate(-25deg)}60%{transform:scale(1.12) rotate(6deg)}100%{transform:scale(1)}}
.ctitle{font-size:29px;font-weight:800;letter-spacing:-.02em;margin:14px 0 6px}
.csub{color:var(--muted);font-size:15.5px;margin:0 0 22px;line-height:1.5}
.rewardrow{display:flex;gap:12px;justify-content:center;margin-bottom:24px}
.reward{background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line2);
  border-radius:20px;padding:18px 14px;min-width:94px;box-shadow:var(--shadow)}
.reward .rv{font-size:25px;font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.reward.g .rv{background:var(--grad-lime);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.reward.o .rv{background:linear-gradient(135deg,var(--orange),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.reward .rl{font-size:12px;color:var(--muted);font-weight:700;margin-top:4px}

/* ---------- drawer / menu ---------- */
.overlay{position:fixed;inset:0;background:rgba(4,7,15,.6);backdrop-filter:blur(3px);z-index:150;opacity:0;
  pointer-events:none;transition:opacity .35s}
.overlay.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;left:0;height:100%;width:min(400px,90vw);z-index:160;
  background:linear-gradient(175deg,#141b2c,#0d1220);border-right:1px solid var(--line2);
  box-shadow:30px 0 60px -20px rgba(0,0,0,.8);transform:translateX(-105%);transition:transform .4s cubic-bezier(.22,1,.36,1);
  display:flex;flex-direction:column;overflow-y:auto}
.drawer.show{transform:none}
.dhead{display:flex;align-items:center;justify-content:space-between;padding:22px 20px 14px;position:sticky;top:0;
  background:linear-gradient(180deg,#141b2c,rgba(20,27,44,.85));backdrop-filter:blur(6px);z-index:2}
.dhead h3{margin:0;font-size:20px;font-weight:800;letter-spacing:-.01em}
.dhead .close{width:38px;height:38px;border-radius:11px;background:var(--card);border:1px solid var(--line);
  display:grid;place-items:center;font-size:19px;color:var(--muted)}
.tabs{display:flex;gap:7px;padding:0 20px 12px;position:sticky;top:66px;background:#141b2c;z-index:2}
.tab{flex:1;padding:10px 2px;border-radius:12px;font-size:12px;font-weight:700;color:var(--muted);
  background:var(--card);border:1px solid var(--line);transition:.2s;white-space:nowrap}
.tab.active{color:#fff;background:rgba(139,92,246,.18);border-color:var(--violet)}
.dbody{padding:6px 20px 40px}

/* plan view */
.pday{border:1px solid var(--line);border-radius:16px;margin-bottom:11px;overflow:hidden;background:var(--card)}
.pday>.ph{width:100%;display:flex;align-items:center;gap:12px;padding:15px 15px}
.ph .pn{width:34px;height:34px;flex:none;border-radius:10px;display:grid;place-items:center;font-size:16px;font-weight:800;
  background:rgba(139,92,246,.18);color:#c4b5fd}
.pday.rest .ph .pn{background:rgba(96,165,250,.18);color:#bfdbfe}
.pday.done-day .ph .pn{background:rgba(34,197,94,.18);color:#86efac}
.ph .pt{flex:1;text-align:left}
.ph .pt b{display:block;font-size:15px;font-weight:800}
.ph .pt span{font-size:12px;color:var(--muted)}
.ph .pc{color:var(--muted);font-size:13px;transition:transform .3s}
.pday.open .ph .pc{transform:rotate(90deg);color:var(--violet)}
.pcontent{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.22,1,.36,1)}
.pday.open .pcontent{max-height:2600px}
.pblock{padding:2px 15px 10px}
.pblabel{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);margin:12px 0 8px;
  display:flex;align-items:center;gap:7px}
.pblabel-badge{font-size:10px;padding:3px 8px;border-radius:999px;background:rgba(244,114,182,.16);color:#fbcfe8;font-weight:800;letter-spacing:.02em}
.pex{border-top:1px solid var(--line)}
.pex>button{width:100%;display:flex;align-items:center;gap:11px;padding:11px 2px;text-align:left}
.pex .num{width:22px;height:22px;flex:none;border-radius:7px;background:var(--card2);display:grid;place-items:center;
  font-size:11px;font-weight:800;color:var(--muted)}
.pex .pxn{flex:1;font-size:14px;font-weight:600;line-height:1.3}
.pex .pxs{font-size:12px;font-weight:800;color:#c4b5fd;white-space:nowrap}
.pex .pxc{color:var(--muted2);font-size:12px;transition:transform .3s}
.pex.open .pxc{transform:rotate(90deg)}
.pxbody{max-height:0;overflow:hidden;transition:max-height .4s;opacity:0}
.pex.open .pxbody{max-height:320px;opacity:1}
.pxbody p{margin:2px 0 12px 33px;font-size:13px;color:var(--muted);line-height:1.55}
.pxbody a{margin:0 0 12px 33px;display:inline-flex;align-items:center;gap:7px;color:#fca5a5;font-weight:700;font-size:13px;
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.22);padding:8px 12px;border-radius:11px;text-decoration:none}

/* stats */
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:16px}
.statcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}
.statcard .sv{font-size:26px;font-weight:800}
.statcard .sl{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}
.tipbox{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 17px;margin-bottom:11px}
.tipbox h4{margin:0 0 7px;font-size:14px;font-weight:800;display:flex;align-items:center;gap:8px}
.tipbox p{margin:0;font-size:13.5px;color:var(--muted);line-height:1.6}

/* settings */
.setrow{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--card);
  border:1px solid var(--line);border-radius:15px;padding:15px 16px;margin-bottom:10px}
.setrow .st{font-size:14.5px;font-weight:700}
.setrow .ss{font-size:12px;color:var(--muted);margin-top:2px}
.switch{width:50px;height:29px;border-radius:999px;background:var(--card2);border:1px solid var(--line2);position:relative;flex:none;transition:.25s}
.switch.on{background:var(--grad-lime);border-color:transparent}
.switch i{position:absolute;top:2px;left:2px;width:23px;height:23px;border-radius:50%;background:#fff;transition:.28s cubic-bezier(.22,1.5,.5,1)}
.switch.on i{left:23px}
.stepper{display:flex;align-items:center;gap:10px;flex:none}
.stepper button{width:34px;height:34px;border-radius:10px;background:var(--card2);border:1px solid var(--line2);font-size:18px;font-weight:800;color:var(--txt)}
.stepper b{min-width:52px;text-align:center;font-size:15px;font-weight:800}
.dangerbtn{width:100%;padding:14px;border-radius:14px;font-size:14px;font-weight:700;margin-top:8px;
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.dangerbtn.hard{background:rgba(239,68,68,.16);border-color:rgba(239,68,68,.5);color:#fecaca}

/* ---------- rest timer overlay ---------- */
.rest-ov{position:fixed;inset:0;z-index:170;background:rgba(6,10,20,.9);backdrop-filter:blur(6px);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.rest-ov.show{display:flex;animation:screenIn .3s}
.rest-ov .rlabel{font-size:14px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.ring{position:relative;width:230px;height:230px;margin:6px 0}
.ring svg{transform:rotate(-90deg)}
.ring .rt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .rt b{font-size:62px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.ring .rt span{font-size:13px;color:var(--muted);font-weight:600;margin-top:2px}
.restbtns{display:flex;gap:11px;margin-top:14px}
.restbtns button{padding:14px 20px;border-radius:15px;font-size:15px;font-weight:800;background:var(--card);border:1px solid var(--line2)}
.restbtns .rskip{background:var(--grad-lime);color:#052e12;border:none}

/* toast + float xp */
.toast{position:fixed;left:50%;top:24px;transform:translateX(-50%) translateY(-80px);background:var(--card2);
  border:1px solid var(--line2);padding:13px 20px;border-radius:15px;font-weight:700;font-size:14.5px;box-shadow:var(--shadow);
  z-index:210;opacity:0;transition:.4s cubic-bezier(.22,1,.36,1);display:flex;align-items:center;gap:9px;max-width:90%}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.xpfloat{position:fixed;z-index:205;font-weight:800;font-size:22px;color:var(--lime);
  text-shadow:0 2px 10px rgba(34,197,94,.6);pointer-events:none;animation:xpUp 1.1s ease-out forwards}
@keyframes xpUp{0%{opacity:0;transform:translateY(0) scale(.6)}20%{opacity:1;transform:translateY(-10px) scale(1.1)}100%{opacity:0;transform:translateY(-90px) scale(1)}}
.footnote{text-align:center;color:var(--muted2);font-size:12px;margin-top:30px;line-height:1.5}
.resetlink{color:var(--muted2);text-decoration:underline;text-underline-offset:2px;background:none;font-size:12px}
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<div class="app" id="app"></div>

<!-- drawer -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>
<div class="drawer" id="drawer">
  <div class="dhead"><h3>Gym Quest</h3><button class="close" onclick="closeMenu()">✕</button></div>
  <div class="tabs">
    <button class="tab active" data-tab="plan" onclick="setTab('plan')">📋 Plan</button>
    <button class="tab" data-tab="pesos" onclick="setTab('pesos')">🏋️ Pesos</button>
    <button class="tab" data-tab="stats" onclick="setTab('stats')">📊 Datos</button>
    <button class="tab" data-tab="set" onclick="setTab('set')">⚙️ Ajustes</button>
  </div>
  <div class="dbody" id="dbody"></div>
</div>

<!-- rest timer -->
<div class="rest-ov" id="restov">
  <div class="rlabel">Descanso entre series</div>
  <div class="ring">
    <svg width="230" height="230"><circle cx="115" cy="115" r="104" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="14"/>
      <circle id="restring" cx="115" cy="115" r="104" fill="none" stroke="url(#rg)" stroke-width="14" stroke-linecap="round"
        stroke-dasharray="653.45" stroke-dashoffset="0"/>
      <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#22c55e"/><stop offset="1" stop-color="#84cc16"/></linearGradient></defs>
    </svg>
    <div class="rt"><b id="restnum">60</b><span>segundos</span></div>
  </div>
  <div class="restbtns">
    <button onclick="addRest(-15)">−15s</button>
    <button class="rskip" onclick="endRest()">Saltar ▶</button>
    <button onclick="addRest(15)">+15s</button>
  </div>
</div>

<div class="toast" id="toast"></div>

function flatEx(d){
  const out=[];
  d.blocks.forEach((b,bi)=>b.ex.forEach(e=>out.push({name:e[0],sets:e[1],block:b.name,kind:b.kind,bi})));
  return out;
}
/* Genera la secuencia de series de un bloque en formato CIRCUITO (round-robin):
   ronda 1 = una serie de cada ejercicio, ronda 2 = una serie de cada uno, etc. */
function blockSequence(flat, bi){
  const idxs=flat.map((e,i)=>i).filter(i=>flat[i].bi===bi);
  const maxR=Math.max(...idxs.map(i=>setsCount(flat[i].sets)));
  const seq=[];
  for(let r=0;r<maxR;r++) idxs.forEach(i=>{ if(r<setsCount(flat[i].sets)) seq.push(i); });
  return seq;
}
function setsCount(s){ const m=s.match(/^(\d+)/); return m?parseInt(m[1]):1; }
function repsPart(s){ return s.includes('×')?s.split('×').slice(1).join('×').trim():s; }
function totalSetsOfDay(d){ return flatEx(d).reduce((a,e)=>a+setsCount(e.sets),0); }

const convert=(v,from,to)=> from===to ? v : (from==='kg' ? v/0.45359237 : v*0.45359237);
function freshWeek(){ return {order:[1,2,3,4,5,6,7], done:[]}; }
function defaultState(){

function load(){
  try{
    const s=JSON.parse(localStorage.getItem(KEY));
    if(!s||!s.week) return defaultState();
    s.settings=Object.assign({rest:true,restSecs:60,vibrate:true,unit:'kg',sbUrl:'',sbKey:''}, s.settings||{});
    s.weights=s.weights||{};
    if(!s.profileId) s.profileId=uuid();
    // sesión de una versión anterior incompatible (estructura de circuito distinta) -> descartar
    if(s.session && !Array.isArray(s.session.blockSteps)) s.session=null;
    return s;
  }
  catch(e){ return defaultState(); }
}
function save(){ S.updatedAt=new Date().toISOString(); localStorage.setItem(KEY, JSON.stringify(S)); schedulePush(); }

   ================================================================= */
let SL=loadLog();
function loadLog(){
  try{ const l=JSON.parse(localStorage.getItem(LOGKEY));
    if(l&&Array.isArray(l.sets)) return Object.assign({sessions:[],sets:[],events:[],queue:[]},l); }
  catch(e){}
  return {sessions:[],sets:[],events:[],queue:[]};
}
function saveLog(){ localStorage.setItem(LOGKEY, JSON.stringify(SL)); }

function sbReady(){ return !!(S.settings.sbUrl && S.settings.sbKey); }
function sbFetch(path,opts={}){
  const u=S.settings.sbUrl.replace(/\/+$/,'');
  const h=Object.assign({apikey:S.settings.sbKey,Authorization:'Bearer '+S.settings.sbKey,
    'Content-Type':'application/json',Prefer:'resolution=merge-duplicates'},opts.headers||{});
  return fetch(u+'/rest/v1/'+path, Object.assign({},opts,{headers:h}));
}
function queueSync(table,row){ SL.queue.push({t:table,r:row}); saveLog(); flushSync(); }
let flushing=false;
async function flushSync(){
  if(!sbReady()||flushing||!SL.queue.length) return;
  flushing=true;
  try{
    const groups={};
    SL.queue.forEach(q=>{ (groups[q.t]=groups[q.t]||[]).push(q.r); });
    for(const t of Object.keys(groups)){
      const r=await sbFetch(t,{method:'POST',body:JSON.stringify(groups[t])});
      if(r.ok) SL.queue=SL.queue.filter(q=>q.t!==t);
    }
    saveLog();
  }catch(e){/* sin conexión: la cola persiste y se reintenta */}
  finally{ flushing=false; }
}
/* estado de progreso multi-dispositivo (last-write-wins) */
function progressState(){ const {xp,streak,lastTrained,weeksDone,week,weights,updatedAt}=S;
  return {xp,streak,lastTrained,weeksDone,week,weights,updatedAt}; }
let pushT=null;
function schedulePush(){ if(!sbReady())return; clearTimeout(pushT); pushT=setTimeout(pushState,2500); }
async function pushState(){
  if(!sbReady())return;
  try{ await sbFetch('app_state',{method:'POST',
    body:JSON.stringify([{profile_id:S.profileId,state:progressState(),updated_at:S.updatedAt||new Date().toISOString()}])}); }
  catch(e){}
}
async function pullState(){
  if(!sbReady())return;
  try{
    const r=await sbFetch('app_state?profile_id=eq.'+encodeURIComponent(S.profileId)+'&select=state,updated_at');
    if(!r.ok) return;
    const rows=await r.json();
    if(rows[0]&&rows[0].state&&rows[0].updated_at&&(!S.updatedAt||rows[0].updated_at>S.updatedAt)){
      Object.assign(S,rows[0].state); S.updatedAt=rows[0].updated_at;
      localStorage.setItem(KEY,JSON.stringify(S));
      toast('☁️ Progreso sincronizado desde la nube'); render();
    }
  }catch(e){}
}

function startSession(d){
  const rec={id:uuid(),profile_id:S.profileId,day_id:d.id,day_title:d.title,day_type:d.type,
    week_number:S.weeksDone+1,started_at:new Date().toISOString(),finished_at:null,duration_min:null,
    completed:false,sets_planned:totalSetsOfDay(d),sets_done:0,postpones:0};
  SL.sessions.push(rec); saveLog(); queueSync('sessions',rec); return rec.id;
}
function finishSession(){
  const s=S.session; if(!s||!s.sid) return;
  const rec=SL.sessions.find(x=>x.id===s.sid); if(!rec) return;
  rec.finished_at=new Date().toISOString();
  rec.duration_min=round1((new Date(rec.finished_at)-new Date(rec.started_at))/60000);
  rec.completed=true; rec.sets_done=setsDoneTotal();
  rec.postpones=Object.values(s.postponed||{}).reduce((a,b)=>a+b,0);
  saveLog(); queueSync('sessions',rec);
}

    week_number:S.weeksDone+1,day_id:S.session?S.session.dayId:(currentDayId()||null)};
  SL.events.push(rec); saveLog(); queueSync('events',rec);

function logSet(e,d,setNumber,weight,isPr,timesPostponed){
  const rec={id:uuid(),session_id:S.session?S.session.sid:null,profile_id:S.profileId,
    logged_at:new Date().toISOString(),week_number:S.weeksDone+1,day_id:d.id,day_title:d.title,
    block:e.block,kind:e.kind,exercise:e.name,set_number:setNumber,sets_total:setsCount(e.sets),
    target:repsPart(e.sets),weight:weight,unit:weight!=null?S.settings.unit:null,
    weight_kg:weight!=null?round1(toKg(weight,S.settings.unit)):null,
    times_postponed:timesPostponed||0,is_pr:!!isPr};
  SL.sets.push(rec); saveLog(); queueSync('sets',rec);
}
function maxWeightKg(exName){

/* ---------- iniciar día ---------- */
function startDay(){
  const cid=currentDayId(), d=dayById(cid), flat=flatEx(d);
  const blockSteps=d.blocks.map((b,bi)=>blockSequence(flat,bi));
  S.session={dayId:cid, sid:null, bi:0, blockSteps, steps:blockSteps[0].slice(),
    setDone:{}, postponed:{}, total:flat.length, totalSets:totalSetsOfDay(d)};
  S.session.sid=startSession(d);
  save(); renderWorkout();
}
function sessionFlat(){ return flatEx(dayById(S.session.dayId)); }
/* avanza de bloque si el circuito actual ya está completo */
function ensureSteps(){
  const s=S.session; if(!s) return;
  while(s.bi<s.blockSteps.length-1 && s.steps.length===0){ s.bi++; s.steps=s.blockSteps[s.bi].slice(); }
}
function currentStep(){ const s=S.session; if(!s) return null; ensureSteps(); return s.steps.length?s.steps[0]:null; }
function remainingSteps(){ const s=S.session; let r=s.steps.length; for(let j=s.bi+1;j<s.blockSteps.length;j++) r+=s.blockSteps[j].length; return r; }
function setsDoneTotal(){ return Object.values(S.session.setDone).reduce((a,b)=>a+b,0); }
function nextStepEx(){
  const s=S.session;
  if(s.steps.length>1) return s.steps[1];
  for(let j=s.bi+1;j<s.blockSteps.length;j++) if(s.blockSteps[j].length) return s.blockSteps[j][0];
  return null;
}

/* ---------- WORKOUT (circuito · serie por serie, rotando) ---------- */
function renderWorkout(cls){
  const s=S.session, d=dayById(s.dayId), flat=sessionFlat();
  const exi=currentStep();
  if(exi===null){ finishDay(); return; }
  const e=flat[exi];
  const info=EX[e.name]||{tag:'main',mus:[],como:'',porque:'',v:'#'};
  const total=setsCount(e.sets), done=s.setDone[exi]||0, cur=done+1;
  const pct=Math.round(setsDoneTotal()/s.totalSets*100);

  // datos del circuito (bloque actual)
  const blockExs=flat.map((x,i)=>i).filter(i=>flat[i].bi===e.bi);
  const isCircuit=blockExs.length>1;
  const rounds=Math.max(...blockExs.map(i=>setsCount(flat[i].sets)));
  const posInBlock=blockExs.indexOf(exi)+1;
  const tagLabel=(isCircuit?'◆ Circuito · ':'')+e.block;
  const nx=nextStepEx();

  const pips=Array.from({length:total},(_,i)=>`<div class="pip ${i<done?'filled':(i===done?'current':'')}"></div>`).join('');
  const chips=(info.mus||[]).map(m=>`<span class="chip">${m}</span>`).join('');
  const wbox=WEIGHTED.has(e.name)?weightBoxHTML(e):'';
  // tira del circuito: un segmento por ejercicio con su progreso de series
  const circuit = isCircuit ? `<div class="circuit">
      <div class="circuit-h">Circuito · Ronda ${cur} de ${rounds} · Ejercicio ${posInBlock}/${blockExs.length}</div>
      <div class="csegs">${blockExs.map(i=>{
        const t=setsCount(flat[i].sets), dn=s.setDone[i]||0, isCur=i===exi;
        return `<div class="cseg ${dn>=t?'cdone':''} ${isCur?'ccur':''}"><i style="width:${Math.round(dn/t*100)}%"></i></div>`;
      }).join('')}</div></div>` : '';
  const nextHint = nx!==null ? `<div class="nexthint">Siguiente máquina → <b>${flat[nx].name}</b></div>`
                             : `<div class="nexthint">Última serie del día 💪</div>`;

  app.innerHTML = topbarHTML()+`<div class="screen">
    <div class="wtop">
      <button class="iconbtn" onclick="exitWorkout()">‹</button>
      <div class="wprog"><div class="pbar"><i style="width:${pct}%"></i></div>
        <div class="ptext"><b>${setsDoneTotal()}</b> / ${s.totalSets} series · Día ${d.id} ${d.title}</div></div>
    </div>
    <div class="exwrap ${cls||'in'}" id="exwrap">
      <div class="exercise"><div class="eglow"></div>
        <span class="extag ${isCircuit?'circuit':info.tag}">${tagLabel}</span>
        <h2 class="exname">${e.name}</h2>
        ${circuit}
        <div class="setbox">
          <div class="setlabel"><span class="sl">Serie de este ejercicio</span><span class="sn"><b>${cur}</b> <span>/ ${total}</span></span></div>
          <div class="pips">${pips}</div>
          <div class="reptarget">Objetivo: <b>${repsPart(e.sets)}</b></div>
        </div>
        ${wbox}
        <div class="exmus">${chips}</div>
        <div class="accord">
          <div class="acc" id="acc0"><button onclick="toggleAcc(0)"><span>📋 Cómo se hace</span><span class="ic">▸</span></button>
            <div class="body"><p>${info.como}</p></div></div>
          <div class="acc" id="acc1"><button onclick="toggleAcc(1)"><span>🎯 Por qué está en tu plan</span><span class="ic">▸</span></button>
            <div class="body"><p>${info.porque}</p><a class="videobtn" href="${info.v}" target="_blank" rel="noopener">▶ Ver video de referencia</a></div></div>
        </div>
        <div class="exactions">
          <button class="done" onclick="doneSet()">✓ Serie hecha →</button>
          <button class="skip" onclick="skipEx()">↪ Ocupada</button>
        </div>
        ${nextHint}
      </div>
    </div>
  </div>`;
}

/* --- caja de peso --- */
let tempW=null; // valor convertido al cambiar de unidad (se usa una vez)
function weightBoxHTML(e){
  const assisted=ASSISTED.has(e.name);
  const saved=S.weights[e.name];
  let prefill='';
  if(tempW!=null){ prefill=tempW; tempW=null; }
  else if(saved) prefill=round1(convert(saved.v,saved.u,S.settings.unit));
  const hint=saved?`Última vez: <b>${saved.v} ${saved.u}</b>`:'Primera vez — registra tu peso base';
  return `<div class="weightbox">
    <div class="wl">${assisted?'⚖️ Contrapeso (asistencia)':'🏋️ Peso usado'}</div>
    <div class="wrow">
      <input id="winput" type="number" inputmode="decimal" step="0.5" min="0" placeholder="0" value="${prefill}">
      <button class="unitbtn" onclick="toggleUnit()">${S.settings.unit}</button>
    </div>
    <div class="whint">${hint}${assisted?' · más contrapeso = más fácil':''}</div>
  </div>`;
}
function toggleUnit(){
  const inp=document.getElementById('winput');
  const cur=(inp&&inp.value!=='')?parseFloat(inp.value):null;
  const old=S.settings.unit;
  S.settings.unit = old==='kg'?'lb':'kg';
  if(cur!=null&&!isNaN(cur)) tempW=round1(convert(cur,old,S.settings.unit));
  save(); renderWorkout('noanim');
}

function doneSet(){
  const s=S.session, flat=sessionFlat();
  const exi=currentStep(); if(exi===null) return;
  const e=flat[exi], d=dayById(s.dayId);
  // capturar peso si el ejercicio lo usa
  let weight=null;
  if(WEIGHTED.has(e.name)){
    const inp=document.getElementById('winput');
    if(inp && inp.value!=null && inp.value!==''){
      const v=parseFloat(inp.value); if(!isNaN(v)&&v>0) weight=v;
    }
  }
  // detección de récord (peso normalizado a kg; no aplica en máquinas asistidas)
  let isPr=false;
  if(weight!=null){
    const prevMax=maxWeightKg(e.name);
    if(!ASSISTED.has(e.name) && prevMax!=null && toKg(weight,S.settings.unit)>prevMax+0.001) isPr=true;
    S.weights[e.name]={v:weight,u:S.settings.unit};
  }
  s.setDone[exi]=(s.setDone[exi]||0)+1;
  s.steps.shift();                 // consume esta serie
  logSet(e,d,s.setDone[exi],weight,isPr,(s.postponed&&s.postponed[exi])||0);
  const gained=XP_SET+(isPr?XP_PR:0);
  addXP(gained); floatXP('+'+gained+' XP'); buzz(15); save();
  if(isPr){ toast('🏆 ¡Nuevo récord en '+e.name+'!'); miniBurst(); logEvent('pr',{exercise:e.name,weight,unit:S.settings.unit}); }
  ensureSteps();
  if(remainingSteps()===0){ miniBurst(); animateOut('out-next', finishDay); return; }
  // en circuito casi siempre cambias de ejercicio → deslizamiento
  afterSet(()=>animateOut('out-next', ()=>renderWorkout('in')));
}
/* descanso entre series (solo gym, si está activo) */
function afterSet(next){
  const restDay=dayById(S.session.dayId).type==='rest';
  if(S.settings.rest && !restDay){ showRest(next); }
  else next();
}
/* omitir: máquina ocupada → manda esta serie al final del circuito actual */
function skipEx(){
  const s=S.session; ensureSteps();
  const uniq=new Set(s.steps);
  if(uniq.size<=1){ buzz(8); toast('Es el último ejercicio del circuito, complétalo'); return; }
  const x=s.steps.shift(); s.steps.push(x);
  s.postponed=s.postponed||{}; s.postponed[x]=(s.postponed[x]||0)+1;
  logEvent('postpone',{exercise:sessionFlat()[x].name});
  save();
  buzz(8); toast('↪ Ocupada · vuelve al final del circuito');
  animateOut('out-skip', ()=>renderWorkout('in'));
}
function exitWorkout(){ renderHome(); }
function animateOut(cls,then){
  const w=document.getElementById('exwrap');
  if(!w){ then(); return; }
  w.classList.remove('in'); w.classList.add(cls);
  setTimeout(then,300);
}

/* ---------- terminar día ---------- */
function finishDay(){
  const cid=S.session?S.session.dayId:currentDayId(), d=dayById(cid);
  finishSession();
  logEvent('day_complete',{day_id:d.id,title:d.title});
  if(!S.week.done.includes(cid)) S.week.done.push(cid);
  if(S.week.done.length===7) logEvent('week_complete',{week:S.weeksDone+1});
  addXP(XP_DAY); updateStreak(); S.session=null; save();
  bigConfetti(d.type==='rest'); buzz([30,40,30,40,60]); renderDayComplete(d);
}
function updateStreak(){
  const t=todayStr();
  if(S.lastTrained===t) return;
  if(S.lastTrained && daysBetween(S.lastTrained,t)===1) S.streak+=1; else S.streak=1;
  S.lastTrained=t;
}

/* ---------- swap por descanso ---------- */
function swapForRest(){
  const cid=currentDayId(), order=S.week.order, ci=order.indexOf(cid);
  let ri=-1;
  for(let i=ci+1;i<order.length;i++){ const id=order[i];
    if(dayById(id).type==='rest' && !S.week.done.includes(id)){ ri=i; break; } }
  if(ri===-1){ toast('No quedan días de descanso para intercambiar'); buzz(8); return; }
  logEvent('swap_rest',{gym_day:order[ci],rest_day:order[ri]});
  [order[ci],order[ri]]=[order[ri],order[ci]];
  S.session=null; save();
  toast('🗓️ Hoy harás el descanso · el gym se mueve para después'); buzz(20); renderHome();
}

const restov=document.getElementById('restov'), restnum=document.getElementById('restnum'), restring=document.getElementById('restring');
const RING_LEN=653.45;
let restInt=null, restT=0, restT0=0, restThen=null;

  updateRestUI(); restov.classList.add('show');

}

function addXP(n){ const b=level(); S.xp+=n; const a=level();
  if(a>b){ logEvent('level_up',{level:a});
    setTimeout(()=>{ toast('⬆️ ¡Subiste a nivel '+a+'!'); bigConfetti(false); buzz([20,30,60]); },400); } }
let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.innerHTML=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200); }
function floatXP(txt){ const el=document.createElement('div'); el.className='xpfloat'; el.textContent=txt;
  const btn=document.querySelector('.done'); const r=btn?btn.getBoundingClientRect():{left:innerWidth/2-30,top:innerHeight/2,width:0};
  el.style.left=(r.left+r.width/2-24)+'px'; el.style.top=(r.top-10)+'px';
  document.body.appendChild(el); setTimeout(()=>el.remove(),1100); }
function buzz(p){ if(S.settings&&S.settings.vibrate&&navigator.vibrate){ try{navigator.vibrate(p);}catch(e){} } }

const cvs=document.getElementById('confetti'), ctx=cvs.getContext('2d');
let parts=[], raf=null;
function resize(){ cvs.width=innerWidth; cvs.height=innerHeight; } resize(); addEventListener('resize',resize);
const COLORS=['#8b5cf6','#6366f1','#22d3ee','#22c55e','#fb923c','#f472b6','#fbbf24'];
function spawn(n,power){ for(let i=0;i<n;i++){ parts.push({x:cvs.width/2+(Math.random()-.5)*140,y:cvs.height*.36,
  vx:(Math.random()-.5)*power,vy:(Math.random()*-1-.4)*power*.75,g:.28+Math.random()*.12,s:6+Math.random()*7,
  rot:Math.random()*6,vr:(Math.random()-.5)*.5,c:COLORS[i%COLORS.length],life:0,max:80+Math.random()*50,shape:Math.random()>.5?0:1}); }
  if(!raf) loop(); }
function miniBurst(){ spawn(28,9); }
function bigConfetti(soft){ spawn(soft?70:120,soft?11:15); if(!soft) setTimeout(()=>spawn(60,13),180); }
function loop(){ ctx.clearRect(0,0,cvs.width,cvs.height); parts=parts.filter(p=>p.life<p.max);
  parts.forEach(p=>{ p.life++; p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.vx*=.99;
    const a=1-p.life/p.max; ctx.save(); ctx.globalAlpha=Math.max(0,a); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.c;
    if(p.shape===0) ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.5); else{ ctx.beginPath(); ctx.arc(0,0,p.s/2,0,7); ctx.fill(); } ctx.restore(); });
  if(parts.length) raf=requestAnimationFrame(loop); else { ctx.clearRect(0,0,cvs.width,cvs.height); raf=null; } }

/* INIT */
try{
  render();
}catch(e){
  console.error('Error al renderizar, reiniciando sesión:', e);
  S.session=null; save();
  try{ render(); }
  catch(e2){
    console.error('Error persistente, reiniciando todo:', e2);
    S=defaultState(); save(); render();
  }
}
/* sincronización en segundo plano */
flushSync(); pullState();
setInterval(flushSync, 30000);
</script>
